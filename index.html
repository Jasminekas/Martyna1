<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martyna's TOEFL Prep</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-main: #6D28D9;
            --brand-energy: #F97316;
            --brand-success: #10B981;
            --bg-page: #F3F0FF;
            --bg-card: #ffffff;
            --text-main: #1F2937;
            --text-muted: #7C3AED;
            --shadow-funky: 0 10px 0px rgba(109, 40, 217, 0.1), 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --border-radius-xl: 30px;
            --border-radius-lg: 20px;
            --border-radius-full: 100px;
            --font-heading: 'Fredoka One', cursive;
            --font-body: 'Open Sans', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-page);
            background-image: radial-gradient(var(--brand-main) 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px 20px 40px 20px;
            box-sizing: border-box;
        }

        /* User Personalization Badge */
        .user-badge {
            background: var(--brand-main);
            color: white;
            padding: 6px 20px;
            border-radius: 0 0 15px 15px;
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(109, 40, 217, 0.2);
        }

        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .brand-logo {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            color: var(--brand-main);
        }

        nav {
            display: flex;
            background: white;
            padding: 6px;
            border-radius: var(--border-radius-full);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        nav button {
            padding: 10px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-family: var(--font-body);
            font-weight: 700;
            border-radius: var(--border-radius-full);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--brand-main);
        }

        nav button.active {
            background: var(--brand-main);
            color: white;
            transform: scale(1.05);
        }

        .container {
            width: 100%;
            max-width: 750px;
            background: var(--bg-card);
            padding: 40px;
            border-radius: var(--border-radius-xl);
            box-shadow: var(--shadow-funky);
            text-align: center;
            display: flex;
            flex-direction: column;
            border: 4px solid white;
        }

        .icon-stage {
            width: 80px;
            height: 80px;
            background: #F3F0FF;
            border-radius: 25px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-stage svg {
            width: 45px;
            height: 45px;
            stroke: var(--brand-main);
            stroke-width: 2;
            fill: none;
        }

        .timer-blob {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px auto;
            background: #FFFEFA;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 6px solid #F3F0FF;
        }

        .timer-text {
            font-family: var(--font-heading);
            font-size: 2rem;
        }

        .category-badge {
            display: inline-block;
            background: var(--brand-main);
            color: white;
            padding: 4px 15px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .prompt-card {
            background: #F9FAFB;
            padding: 25px;
            border-radius: var(--border-radius-lg);
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 20px;
            border: 3px solid #E5E7EB;
            border-radius: var(--border-radius-lg);
            font-size: 1.1rem;
            font-family: var(--font-body);
            resize: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-main {
            font-family: var(--font-heading);
            background: var(--brand-energy);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            border-radius: var(--border-radius-full);
            cursor: pointer;
            box-shadow: 0 5px 0px #C25E14;
        }

        .btn-secondary {
            font-family: var(--font-body);
            background: var(--brand-success);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: var(--border-radius-full);
            cursor: pointer;
            box-shadow: 0 5px 0px #065F46;
        }

        .btn-main:active, .btn-secondary:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0px #000;
        }

        .vocab-box {
            background: rgba(16, 185, 129, 0.1);
            padding: 15px;
            border-radius: var(--border-radius-lg);
            margin-bottom: 20px;
            text-align: left;
            border-left: 5px solid var(--brand-success);
            font-size: 0.9rem;
        }

        .hidden { display: none !important; }
        .text-danger { color: #EF4444 !important; }
    </style>
</head>
<body>

    <div class="user-badge">Martyna's TOEFL Preparation</div>

    <header>
        <div class="brand-logo">TOEFL Hero</div>
        <nav>
            <button id="tab-speaking" class="active" onclick="switchTab('speaking')">Speaking</button>
            <button id="tab-writing" onclick="switchTab('writing')">Writing</button>
        </nav>
    </header>

    <div id="speaking-view" class="container">
        <div class="icon-stage" id="speak-icon">
            <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </div>
        
        <div class="timer-blob">
            <div style="font-size: 0.7rem; font-weight: 800; color: var(--text-muted);" id="speak-phase">READY?</div>
            <div class="timer-text" id="speak-timer">00:20</div>
        </div>

        <div class="prompt-card">
            <div class="category-badge" id="speak-cat">Warm Up</div>
            <div class="prompt-text" id="speak-prompt">Ready to practice? Draw your first question!</div>
        </div>
        
        <button class="btn-main" onclick="startSpeaking()">New Topic</button>
    </div>

    <div id="writing-view" class="container hidden">
        <div class="timer-text" style="margin-bottom: 20px;" id="write-timer">04:00</div>

        <div class="prompt-card">
            <div class="category-badge" id="write-cat">Task 2</div>
            <div class="prompt-text" id="write-prompt">Click below to get your paragraph prompt.</div>
        </div>
        
        <textarea id="write-input" placeholder="Start typing your response here..."></textarea>
        
        <div class="vocab-box" id="vocab-suggestion">
            Suggested vocabulary keywords will appear here.
        </div>
        
        <div class="btn-group">
            <button class="btn-main" onclick="startWriting()">New Prompt</button>
            <button class="btn-secondary" onclick="downloadEssay()">💾 Save Essay</button>
        </div>
    </div>

    <script>
        const icons = {
            edu: '<svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>',
            tech: '<svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
            life: '<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
            social: '<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
            money: '<svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>'
        };

        const speakingPrompts = [
            {q: "Do you prefer studying alone or with a group?", cat: "Education", ico: "edu"},
            {q: "Should universities require physical education classes?", cat: "Education", ico: "edu"},
            {q: "Prefer living in a small town or a big city?", cat: "Lifestyle", ico: "life"},
            {q: "Better to get news from newspapers or social media?", cat: "Technology", ico: "tech"},
            {q: "Should students work part-time while studying?", cat: "Education", ico: "edu"},
            {q: "Allow smartphones in elementary school?", cat: "Technology", ico: "tech"},
            {q: "Exams vs. Research Papers?", cat: "Education", ico: "edu"},
            {q: "Spend money on travel or material things?", cat: "Money", ico: "money"},
            {q: "Space exploration vs. Environmental protection?", cat: "Social", ico: "social"},
            {q: "Large company vs. Small start-up?", cat: "Social", ico: "social"},
            {q: "Learn a second language at a young age?", cat: "Education", ico: "edu"},
            {q: "Celebrities as role models?", cat: "Social", ico: "social"},
            {q: "Is it always better to tell the truth?", cat: "Lifestyle", ico: "life"},
            {q: "Guided tours vs. Exploring alone?", cat: "Lifestyle", ico: "life"},
            {q: "Movies at home vs. In a cinema?", cat: "Lifestyle", ico: "life"},
            {q: "Vocational training in high schools?", cat: "Education", ico: "edu"},
            {q: "Being a leader vs. a follower?", cat: "Social", ico: "social"},
            {q: "Digital books vs. Printed books?", cat: "Technology", ico: "tech"},
            {q: "Should city centers be car-free?", cat: "Social", ico: "social"},
            {q: "High pay/long hours vs. low pay/more free time?", cat: "Money", ico: "money"},
            {q: "History as a mandatory university subject?", cat: "Education", ico: "edu"},
            {q: "Planning vacations vs. spontaneity?", cat: "Lifestyle", ico: "life"},
            {q: "Study in the morning vs. late at night?", cat: "Education", ico: "edu"},
            {q: "Mandatory art/music in primary schools?", cat: "Education", ico: "edu"},
            {q: "Social media and loneliness?", cat: "Technology", ico: "tech"}
        ];

        const writingTasks = [
            { q: "Explain the impact of remote work on modern urban development.", v: "Infrastructure, decentralization, work-life balance, commuting.", cat: "Technology" },
            { q: "Should the government provide free public transportation?", v: "Sustainability, tax revenue, accessibility, carbon footprint.", cat: "Social" },
            { q: "Has technology improved or hindered interpersonal communication?", v: "Digital divide, non-verbal cues, connectivity, isolation.", cat: "Technology" },
            { q: "Is a university degree still necessary for a successful career?", v: "Credentialism, specialized skills, networking, self-taught.", cat: "Education" },
            { q: "Analyze the benefits and drawbacks of a four-day work week.", v: "Productivity, burnout, overhead costs, retention.", cat: "Lifestyle" }
        ];

        let speakInterval, writeInterval;

        function switchTab(tab) {
            document.getElementById('speaking-view').classList.toggle('hidden', tab !== 'speaking');
            document.getElementById('writing-view').classList.toggle('hidden', tab !== 'writing');
            document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === tab));
            clearInterval(speakInterval);
            clearInterval(writeInterval);
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function startSpeaking() {
            clearInterval(speakInterval);
            const data = speakingPrompts[Math.floor(Math.random() * speakingPrompts.length)];
            document.getElementById('speak-prompt').innerText = data.q;
            document.getElementById('speak-cat').innerText = data.cat;
            document.getElementById('speak-icon').innerHTML = icons[data.ico];
            
            let timeLeft = 20;
            const timerDisplay = document.getElementById('speak-timer');
            const phaseDisplay = document.getElementById('speak-phase');
            timerDisplay.classList.remove('text-danger');
            phaseDisplay.innerText = "PREPARING";

            speakInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = formatTime(timeLeft);
                if (timeLeft <= 0) {
                    clearInterval(speakInterval);
                    startSpeakingResponse();
                }
            }, 1000);
        }

        function startSpeakingResponse() {
            let timeLeft = 90;
            const timerDisplay = document.getElementById('speak-timer');
            document.getElementById('speak-phase').innerText = "SPEAK NOW";
            
            speakInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = formatTime(timeLeft);
                if(timeLeft < 10) timerDisplay.classList.add('text-danger');
                if (timeLeft <= 0) {
                    clearInterval(speakInterval);
                    document.getElementById('speak-phase').innerText = "DONE!";
                }
            }, 1000);
        }

        function startWriting() {
            clearInterval(writeInterval);
            const task = writingTasks[Math.floor(Math.random() * writingTasks.length)];
            document.getElementById('write-prompt').innerText = task.q;
            document.getElementById('write-cat').innerText = task.cat;
            document.getElementById('vocab-suggestion').innerHTML = `<strong>Vocab:</strong> ${task.v}`;
            document.getElementById('write-input').value = "";
            
            let timeLeft = 240;
            const timerDisplay = document.getElementById('write-timer');
            timerDisplay.classList.remove('text-danger');

            writeInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = formatTime(timeLeft);
                if(timeLeft < 30) timerDisplay.classList.add('text-danger');
                if (timeLeft <= 0) clearInterval(writeInterval);
            }, 1000);
        }

        function downloadEssay() {
            const text = document.getElementById('write-input').value;
            const prompt = document.getElementById('write-prompt').innerText;
            if(!text) { alert("Type something first!"); return; }
            
            const content = `TOEFL Writing Practice\nPrompt: ${prompt}\n\nResponse:\n${text}`;
            const blob = new Blob([content], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "TOEFL_Practice_Martyna.txt";
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
